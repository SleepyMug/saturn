services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SATURN_BASE_TAG: "${SATURN_BASE_TAG}"
    pull_policy: never
    init: true
    stdin_open: true
    tty: true
    network_mode: host
    environment:
      DEV_UID: "${DEV_UID}"
      DEV_GID: "${DEV_GID}"
      DEV_USER: guest
      DEV_PROJECT_NAME: "${DEV_PROJECT_NAME}"
      SATURN_LEVEL: "${SATURN_LEVEL}"
    working_dir: /home/guest/${DEV_PROJECT_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # saturn-dual-mode start
      - ../:/home/guest/${DEV_PROJECT_NAME}
      - ~/.claude:/home/guest/.claude
      - ~/.claude.json:/home/guest/.claude.json
      # saturn-dual-mode end
    command: ["sleep", "infinity"]
